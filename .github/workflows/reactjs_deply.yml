name: CICD Reactjs Project...

on: 
  push:
    branches: [ main ] 

jobs:
    build:
        runs-on: ubuntu-latest

        steps:    
        - name: Checkout code 
          uses: actions/checkout@v4
        - name: SSH and Deploy
          uses: appleboy/ssh-action@master
          with:
            host: ${{ secrets.EC2_HOST }}  # <--- Check this name matches your Secret
            username: ubuntu
            key: ${{ secrets.EC2_SSH_KEY }}
            port: 22                       # Adding this explicitly can help
            script: |
                cd /home/ubuntu/your-repo-name
                git pull origin main
        - name: Set up Node.js
          uses: actions/setup-node@v3
          with:
            node-version: '18'
        - name: Install dependencies
          run: npm install
        - name: Build the project
          run: npm run build
        - name: Deploy to server
          run: npm run production